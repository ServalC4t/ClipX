// ===== COMPOSITION =====
function addToComposition(){
  const mat=activeMat(); if(!mat) return;
  saveUndoState();
  const clip={id:genId(),materialId:mat.id,filePath:mat.filePath,fileName:mat.fileName,
    trimStart:mat.trimStart,trimEnd:mat.trimEnd,stretch169:mat.stretch169,
    telop:mat.telop?{...mat.telop}:{enabled:false,text:mat.fileName.replace(/\.[^.]+$/,''),style:'box',color:'#ffffff',bgColor:'#000000',bgOpacity:0.6,fontSize:32,font:'sans',duration:3},
    transition:{id:'dissolve',duration:0.5},
    adjustments:{volume:1,speed:1,brightness:0,gamma:1,contrast:1}};
  composition.push(clip);
  activeCompId=clip.id;
  renderComposition(); updateWarn();
  mat.trimStart=0;mat.trimEnd=mat.duration;
  renderHandles(mat);updateStats(mat);drawWaveform(mat);renderMaterials();
}

function renderComposition(){
  const list=$('composition-list'); list.innerHTML='';
  if(!composition.length){
    const e=document.createElement('div'); e.className='comp-empty'; e.textContent=t('comp_empty');
    list.appendChild(e);
  } else {
    composition.forEach((clip,i)=>{
      // トランジション
      if(i>0){
        const trans=clip.transition||{id:'dissolve',duration:0.5};
        const tDef=TRANSITIONS.find(x=>x.id===trans.id)||TRANSITIONS[0];
        const tName=t('trans_'+tDef.id);
        const wrapper=document.createElement('div'); wrapper.className='comp-transition';
        wrapper.innerHTML=`<div class="trans-chip">
          <div class="trans-chip-left"><span class="trans-chip-name">${tName}</span><span class="trans-chip-dur" id="tchip-dur-${i}">${trans.duration}${t('label_trans_sec')}</span></div>
          <span class="trans-chip-remove" data-ri="${i}">✕</span>
        </div>
        <div class="trans-expanded" id="texp-${i}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <select class="trans-select" id="tsel-${i}" style="flex:1;margin-bottom:0;">${TRANSITIONS.map(tr=>`<option value="${tr.id}"${tr.id===trans.id?' selected':''}>${t('trans_'+tr.id)}</option>`).join('')}</select>
            <button style="background:none;border:none;color:var(--text3);cursor:pointer;padding:0 4px;font-size:13px;margin-left:6px;" id="tclose-${i}">✕</button>
          </div>
          <div class="trans-dur-row"><span>${t('label_trans_time')}</span>
            <button class="trans-dur-btn" id="tdec-${i}">▽</button>
            <span class="trans-dur-val" id="tdv-${i}">${trans.duration}${t('label_trans_sec')}</span>
            <button class="trans-dur-btn" id="tinc-${i}">△</button>
          </div>
        </div>`;
        // チップクリックで展開
        wrapper.querySelector('.trans-chip').addEventListener('click',e=>{
          if(e.target.closest('.trans-chip-remove')) return;
          $(`texp-${i}`).classList.toggle('open');
        });
        // ×でカット化
        wrapper.querySelector(`[data-ri="${i}"]`).addEventListener('click',e=>{
          e.stopPropagation();
          saveUndoState();
          composition[i].transition={id:'cut',duration:0};
          renderComposition();
        });
        // ホイールで切り替え
        wrapper.querySelector('.trans-chip').addEventListener('wheel',e=>{
          e.preventDefault();
          const cur=TRANSITIONS.findIndex(x=>x.id===composition[i].transition.id);
          const next=(cur+(e.deltaY>0?1:-1)+TRANSITIONS.length)%TRANSITIONS.length;
          composition[i].transition.id=TRANSITIONS[next].id;
          // チップ名だけ更新（再描画しない）
          wrapper.querySelector('.trans-chip-name').textContent=t('trans_'+TRANSITIONS[next].id);
          const sel=$(`tsel-${i}`); if(sel) sel.value=TRANSITIONS[next].id;
        },{passive:false});
        // ドロップダウン・秒数・閉じる
        setTimeout(()=>{
          const sel=$(`tsel-${i}`); if(sel) sel.onchange=()=>{
            composition[i].transition.id=sel.value;
            wrapper.querySelector('.trans-chip-name').textContent=t('trans_'+sel.value)||sel.value;
          };
          const dec=$(`tdec-${i}`); if(dec) dec.onclick=()=>{
            const v=Math.max(0.1,parseFloat((composition[i].transition.duration-0.1).toFixed(1)));
            composition[i].transition.duration=v;
            const dv=$(`tdv-${i}`); if(dv) dv.textContent=v+t('label_trans_sec');
            const cd=$(`tchip-dur-${i}`); if(cd) cd.textContent=v+t('label_trans_sec');
          };
          const inc=$(`tinc-${i}`); if(inc) inc.onclick=()=>{
            const v=Math.min(3,parseFloat((composition[i].transition.duration+0.1).toFixed(1)));
            composition[i].transition.duration=v;
            const dv=$(`tdv-${i}`); if(dv) dv.textContent=v+t('label_trans_sec');
            const cd=$(`tchip-dur-${i}`); if(cd) cd.textContent=v+t('label_trans_sec');
          };
          const cls=$(`tclose-${i}`); if(cls) cls.onclick=()=>$(`texp-${i}`).classList.remove('open');
        },0);
        list.appendChild(wrapper);
      }
      // クリップカード
      const card=document.createElement('div'); card.className='comp-clip'+(clip.id===activeCompId?' active':'');
      card.draggable=true;
      card.dataset.clipId=clip.id;
      card.innerHTML=`<div class="comp-thumb" id="cthumb-${clip.id}"><span style="font-size:8px;">▶</span></div>
        <div class="comp-meta"><div class="comp-name">${(clip.telop&&clip.telop.enabled&&clip.telop.text)?clip.telop.text:clip.fileName.replace(/\.[^.]+$/,'')}</div>
        <div class="comp-dur">${fmt(clip.trimEnd-clip.trimStart)}</div></div>
        <span class="comp-remove" data-ci="${clip.id}">✕</span>`;
      // D&D並び替え
      card.addEventListener('dragstart',e=>{
        e.dataTransfer.setData('text/plain',clip.id);
        card.style.opacity='0.4';
      });
      card.addEventListener('dragend',()=>{card.style.opacity='';});
      card.addEventListener('dragover',e=>{e.preventDefault();card.style.borderColor='var(--accent)';});
      card.addEventListener('dragleave',()=>{card.style.borderColor='';});
      card.addEventListener('drop',e=>{
        e.preventDefault(); card.style.borderColor='';
        const fromId=e.dataTransfer.getData('text/plain');
        if(fromId===clip.id) return;
        const fromIdx=composition.findIndex(c=>c.id===fromId);
        const toIdx=composition.findIndex(c=>c.id===clip.id);
        if(fromIdx<0||toIdx<0) return;
        saveUndoState();
        const [moved]=composition.splice(fromIdx,1);
        composition.splice(toIdx,0,moved);
        renderComposition();
      });
      card.onclick=e=>{if(e.target.closest('.comp-remove')) return;
        activeCompId=clip.id;
        const mat=materials.find(m=>m.id===clip.materialId||m.filePath===clip.filePath);
        if(mat){
          activeMaterialId=mat.id;
          mat.trimStart=clip.trimStart;
          mat.trimEnd=clip.trimEnd;
          // クリップのテロップ設定を素材にも反映してトリムパネルに表示
          if(clip.telop) mat.telop=clip.telop;
          renderMaterials(); loadPreview(mat); showTrim(mat);
          // クリップ単体を先頭から再生
          const vid=$('preview-video');
          _playInRange=true;
          const doPlay=()=>{vid.currentTime=clip.trimStart;vid.play();};
          vid.readyState>=2?doPlay():vid.addEventListener('canplay',doPlay,{once:true});
        }
        renderComposition();};
      card.querySelector('[data-ci]').onclick=e=>{e.stopPropagation();saveUndoState();composition=composition.filter(c=>c.id!==clip.id);renderComposition();updateWarn();};
      card.addEventListener('contextmenu',e=>{e.preventDefault();showContextMenu(e.clientX,e.clientY,clip.id);});
      list.appendChild(card);
      generateThumb(clip,'cthumb-');
    });
  }
  // フッター
  const tot=totalCompDur(); const p=activePreset();
  const el=$('comp-total-dur'); el.textContent=fmt(tot);
  el.className=p&&tot>p.maxDuration?'over':'';
  const est=p?estimateMB(tot,p):null;
  $('comp-total-size').textContent=est?t('label_comp_size',{est}):'';
  updateButtons(); updateWarn();
}

// ===== CONTEXT MENU =====
function setupContextMenu(){
  $('ctx-duplicate').onclick=()=>{hideContextMenu();if(!contextTargetId) return;const idx=composition.findIndex(c=>c.id===contextTargetId);if(idx<0) return;saveUndoState();const copy={...JSON.parse(JSON.stringify(composition[idx])),id:genId()};composition.splice(idx+1,0,copy);renderComposition();updateWarn();showToast(t('toast_duplicate_done'));};
  $('ctx-remove').onclick=()=>{hideContextMenu();if(contextTargetId){saveUndoState();composition=composition.filter(c=>c.id!==contextTargetId);renderComposition();updateWarn();}};
  document.addEventListener('click',e=>{if(!e.target.closest('#context-menu'))hideContextMenu();});

  // Ctrl+ホイールで全トランジション一括変更
  $('composition-list').addEventListener('wheel',e=>{
    if(!e.ctrlKey) return;
    e.preventDefault();
    const cur=composition.find(c=>c.transition&&c.transition.id!=='cut')?.transition?.id||TRANSITIONS[0].id;
    const idx=TRANSITIONS.findIndex(t=>t.id===cur);
    const next=TRANSITIONS[(idx+(e.deltaY>0?1:-1)+TRANSITIONS.length)%TRANSITIONS.length];
    saveUndoState();
    composition.forEach((clip,i)=>{
      if(i===0) return;
      clip.transition={id:next.id,duration:clip.transition?.duration||0.5};
    });
    renderComposition(); updateWarn();
    // トースト表示
    showToast(t('toast_transition_all',{name:t('trans_'+next.id)}));
  },{passive:false});
  ['volume','speed','brightness','gamma','contrast'].forEach(key=>{
    $(`ctx-adj-${key}`).oninput=()=>{
      const v=parseFloat($(`ctx-adj-${key}`).value);
      $(`ctx-${key}-val`).textContent=key==='speed'?v.toFixed(2)+'x':v.toFixed(2);
      const clip=composition.find(c=>c.id===contextTargetId);
      if(clip){if(!clip.adjustments)clip.adjustments={volume:1,speed:1,brightness:0,gamma:1,contrast:1};clip.adjustments[key]=v;applyAdjustmentsToPreview(clip.adjustments);}
    };
  });
  $('ctx-adj-reset').onclick=()=>{
    const clip=composition.find(c=>c.id===contextTargetId); if(!clip) return;
    clip.adjustments={volume:1,speed:1,brightness:0,gamma:1,contrast:1};
    loadCtxSliders(clip);
    applyAdjustmentsToPreview(clip.adjustments);
  };

  // テロップトグル
  $('ctx-telop-toggle').onclick=()=>{
    const clip=composition.find(c=>c.id===contextTargetId); if(!clip) return;
    if(!clip.telop) clip.telop={enabled:false,text:'',style:'box',color:'#ffffff',bgColor:'#000000',bgOpacity:0.6,fontSize:32,font:'sans',duration:3};
    clip.telop.enabled=!clip.telop.enabled;
    $('ctx-telop-toggle').textContent=clip.telop.enabled?t('btn_telop_on'):t('btn_telop_off');
    $('ctx-telop-toggle').className='telop-toggle'+(clip.telop.enabled?' active':'');
    $('ctx-telop-settings').style.display=clip.telop.enabled?'flex':'none';
    renderComposition();
  };

  // テロップ入力欄
  const telopSync=()=>{
    const clip=composition.find(c=>c.id===contextTargetId); if(!clip||!clip.telop) return;
    clip.telop.text=$('ctx-telop-text').value;
    clip.telop.x=parseFloat($('ctx-telop-x').value)||3;
    clip.telop.y=parseFloat($('ctx-telop-y').value)||3;
    clip.telop.style=$('ctx-telop-style').value;
    clip.telop.color=$('ctx-telop-color').value;
    clip.telop.bgColor=$('ctx-telop-bgcolor').value;
    clip.telop.font=$('ctx-telop-font').value;
    clip.telop.fontSize=parseInt($('ctx-telop-fontsize').value);
    clip.telop.duration=parseFloat($('ctx-telop-duration').value);
    renderComposition();
  };
  ['ctx-telop-text','ctx-telop-x','ctx-telop-y','ctx-telop-style','ctx-telop-color','ctx-telop-bgcolor','ctx-telop-font','ctx-telop-fontsize','ctx-telop-duration'].forEach(id=>{
    $(id).oninput=$(id).onchange=telopSync;
  });
}

function loadCtxSliders(clip){
  const a=clip.adjustments||{volume:1,speed:1,brightness:0,gamma:1,contrast:1};
  $('ctx-adj-volume').value=a.volume??1; $('ctx-volume-val').textContent=(a.volume??1).toFixed(2);
  $('ctx-adj-speed').value=a.speed; $('ctx-speed-val').textContent=a.speed.toFixed(2)+'x';
  $('ctx-adj-brightness').value=a.brightness; $('ctx-brightness-val').textContent=a.brightness.toFixed(2);
  $('ctx-adj-gamma').value=a.gamma; $('ctx-gamma-val').textContent=a.gamma.toFixed(2);
  $('ctx-adj-contrast').value=a.contrast; $('ctx-contrast-val').textContent=a.contrast.toFixed(2);
  $('ctx-clip-name').textContent=(clip.telop&&clip.telop.enabled&&clip.telop.text)?clip.telop.text:clip.fileName.replace(/\.[^.]+$/,'');
  // テロップ
  const telop=clip.telop||{};

  tog.textContent=telop.enabled?t('btn_telop_on'):t('btn_telop_off');
  tog.className='telop-toggle'+(telop.enabled?' active':'');
  $('ctx-telop-settings').style.display=telop.enabled?'flex':'none';
  $('ctx-telop-text').value=telop.text||clip.fileName.replace(/\.[^.]+$/,'')||'';
  $('ctx-telop-x').value=telop.x??3;
  $('ctx-telop-y').value=telop.y??3;
  $('ctx-telop-style').value=telop.style||'box';
  $('ctx-telop-color').value=telop.color||'#ffffff';
  $('ctx-telop-bgcolor').value=telop.bgColor||'#000000';
  $('ctx-telop-font').value=telop.font||'sans';

function showContextMenu(x,y,clipId){
  contextTargetId=clipId;

  menu.style.left='0'; menu.style.top='0';
  menu.classList.add('show');
  const mw=menu.offsetWidth, mh=menu.offsetHeight;
  menu.style.left=Math.min(x,window.innerWidth-mw-4)+'px';
  menu.style.top=Math.min(y,window.innerHeight-mh-4)+'px';

// ===== ADJUST PANEL =====

function applyAdjustmentsToPreview(adjustments){
  const vid=$('preview-video'); if(!vid) return;
  const a=adjustments||{volume:1,speed:1,brightness:0,gamma:1,contrast:1};
  vid.playbackRate=a.speed||1;
  const previewVol=parseFloat($('preview-volume')?.value||1);
  vid.volume=Math.min(1,(a.volume??1)*previewVol);
  const brightness=1+(a.brightness||0)*2;
  const contrast=a.contrast||1;
  // ガンマはCSSのbrightness+contrastで近似（gamma>1=明るく、<1=暗く）
  const gamma=a.gamma||1;
  const gammaBrightness=(gamma>1)?(1+(gamma-1)*0.4):(1-(1-gamma)*0.4);
  vid.style.filter=`brightness(${(brightness*gammaBrightness).toFixed(3)}) contrast(${contrast.toFixed(2)})`;
}
function updateWarn(){
  const p=activePreset(); const wb=$('warn-box');
  if(!p||!composition.length){wb.style.display='none';return;}
  const tot=totalCompDur(); const est=parseFloat(estimateMB(tot,p)||0);
  const warns=[];
  if(tot>p.maxDuration) warns.push(t('warn_over_time',{dur:fmt(tot),max:fmt(p.maxDuration)}));
  if(est>p.maxSizeMB) warns.push(t('warn_over_size',{est,max:p.maxSizeMB}));
  if(warns.length){wb.style.display='';wb.textContent='⚠ '+warns[0];}else wb.style.display='none';
}

function updateButtons(){
  $('btn-export').disabled=!composition.length;
  $('btn-open-folder').disabled=!lastOutputPath;
}

function splitClip(){
  if(!activeCompId){showToast(t('toast_no_clip'));return;}
  const vid=$('preview-video');
  const idx=composition.findIndex(c=>c.id===activeCompId);
  if(idx<0) return;
  const clip=composition[idx];
  const ct=vid.currentTime;
  if(ct<=clip.trimStart+FRAME*2||ct>=clip.trimEnd-FRAME*2){showToast(t('toast_split_range'));return;}
  saveUndoState();
  const newClip={...JSON.parse(JSON.stringify(clip)),id:genId(),trimStart:ct,transition:{id:'cut',duration:0}};
  composition[idx]={...clip,trimEnd:ct};
  composition.splice(idx+1,0,newClip);
  activeCompId=newClip.id;
  renderComposition();updateWarn();showToast(t('toast_split_done'));
}

$('btn-cancel-export').onclick=async()=>{
  await window.clipx.cancelExport();
  $('progress-overlay').classList.remove('show');
  window.clipx.offExportProgress();
  showToast(t('toast_export_cancelled'));
};

$('btn-export').onclick=async()=>{
  if(!composition.length) return;
  const preset=activePreset(); if(!preset) return;
  const outputPath=await window.clipx.chooseOutputPath(`clipx_${Date.now()}.mp4`); if(!outputPath) return;
  const overlay=$('progress-overlay'); overlay.classList.add('show');
  $('progress-bar').style.width='0%'; $('progress-pct').textContent='0%';
  window.clipx.onExportProgress(v=>{$('progress-bar').style.width=v+'%';$('progress-pct').textContent=v+'%';});
  try{
    const result=await window.clipx.exportClip({
      clips:composition.map(c=>({inputPath:c.filePath,startTime:c.trimStart,duration:c.trimEnd-c.trimStart,transition:c.transition,stretch169:c.stretch169,telop:c.telop,adjustments:c.adjustments||{speed:1,brightness:0,gamma:1,contrast:1}})),
      outputPath,preset,encoder:settings.encoder||'auto'
    });
    lastOutputPath=outputPath;
    overlay.classList.remove('show'); window.clipx.offExportProgress(); updateButtons();
    alert(t('alert_export_done',{size:result.sizeMB}));
  }catch(e){overlay.classList.remove('show');window.clipx.offExportProgress();alert(t('alert_export_failed',{error:e}));}
};
$('btn-open-folder').onclick=()=>{if(lastOutputPath)window.clipx.showInExplorer(lastOutputPath);};

// ===== SETTINGS =====
function setupSettings(){
  $('titlebar-settings').onclick=openSettings;
  $('btn-new-project').onclick=()=>{if(!materials.length&&!composition.length) return;if(!confirm(t('confirm_new_project'))) return;saveUndoState();materials=[];composition=[];activeMaterialId=null;activeCompId=null;renderMaterials();renderComposition();$('preview-video').style.display='none';$('preview-placeholder').style.display='';$('trim-panel').classList.add('hidden');updateWarn();showToast(t('toast_new_project'));};
  $('btn-save-project').onclick=async()=>{const data={materials,composition,selectedPresetId};const p=await window.clipx.saveProject(data);if(p)showToast(t('toast_saved'));};
  $('btn-load-project').onclick=async()=>{const data=await window.clipx.loadProject();if(!data) return;saveUndoState();materials=data.materials||[];composition=data.composition||[];selectedPresetId=data.selectedPresetId||selectedPresetId;activeMaterialId=materials.length?materials[materials.length-1].id:null;activeCompId=null;renderMaterials();renderComposition();renderPresets();updateWarn();const mat=activeMat();if(mat){loadPreview(mat);showTrim(mat);}showToast(t('toast_loaded'));};
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    if(e.ctrlKey&&e.code==='KeyS'){e.preventDefault();$('btn-save-project').onclick();}
    if(e.ctrlKey&&e.code==='KeyO'){e.preventDefault();$('btn-load-project').onclick();}
  });
  $('settings-cancel-btn').onclick=()=>$('settings-modal').classList.remove('show');
  $('settings-save-btn').onclick=saveSettings;
  $('link-github').onclick=()=>window.clipx.openExternal('https://servalc4t.github.io/my-projects/');
  document.querySelectorAll('.settings-tab').forEach(tab=>{
    tab.onclick=()=>{
      currentTab=tab.dataset.tab;
      document.querySelectorAll('.settings-tab').forEach(tab2=>tab2.classList.toggle('active',tab2===tab));
      document.querySelectorAll('[data-tab-content]').forEach(c=>{c.style.display=c.dataset.tabContent===currentTab?'':'none';});
      wireAdvancedToggle();
    };
  });
  wireAdvancedToggle();
  $('btn-pick-output-dir').onclick=async()=>{const d=await window.clipx.pickDirectory();if(d)$('setting-output-dir').value=d;};
  $('btn-pick-temp-dir').onclick=async()=>{const d=await window.clipx.pickDirectory();if(d)$('setting-temp-dir').value=d;};
  const addPresetBtn=$('btn-add-preset');
  if(addPresetBtn) addPresetBtn.textContent=t('btn_add_preset');
  $('btn-add-preset').onclick=()=>{settings.presets.push({id:'custom-'+genId(),name:'Custom',maxDuration:140,maxSizeMB:512,totalBitrateMbps:6,maxWidth:1280,maxHeight:720,videoCodec:'libx264',audioCodec:'aac',audioBitrate:'128k',fps:'30',encPreset:'fast',visible:true,isDefault:false});renderPresetsSettings();};
}

function openSettings(){
  $('setting-output-dir').value=settings.outputDir||'';
  $('setting-temp-dir').value=settings.tempDir||'';
  $('setting-encoder').value=settings.encoder||'auto';
  $('setting-preview-res').value=settings.previewRes||'auto';
  $('setting-drag-lowres').checked=settings.dragLowres!==false;
  const sel=$('setting-default-preset'); sel.innerHTML='';
  (settings.presets||[]).forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=getPresetName(p);if(p.id===selectedPresetId)o.selected=true;sel.appendChild(o);});
  // Language selector
  const langSel=$('setting-language');
  if(langSel){langSel.innerHTML='';const names=window.getLangNames();Object.entries(names).forEach(([code,name])=>{const o=document.createElement('option');o.value=code;o.textContent=name;if(code===window.getCurrentLang())o.selected=true;langSel.appendChild(o);});}
  // Disclaimer text
  const dt=$('disclaimer-text');
  if(dt) dt.textContent=t('disclaimer_text');
  renderPresetsSettings();
  currentTab='general';
  document.querySelectorAll('.settings-tab').forEach(tab=>tab.classList.toggle('active',tab.dataset.tab==='general'));
  document.querySelectorAll('[data-tab-content]').forEach(c=>{c.style.display=c.dataset.tabContent==='general'?'':'none';});
  $('settings-modal').classList.add('show');
}

function renderPresetsSettings(){
  const container=$('presets-container'); container.innerHTML='';
  (settings.presets||[]).forEach((p,idx)=>{
    const card=document.createElement('div'); card.className='settings-preset-card';
    card.innerHTML=`<div class="settings-preset-header">
      <span class="settings-preset-name-label">${p.isDefault?getPresetName(p):`<input style="background:var(--bg3);border:0.5px solid var(--border2);border-radius:4px;padding:3px 6px;color:var(--text1);font-size:12px;font-family:inherit;width:130px;" data-idx="${idx}" data-key="name" value="${p.name}">`}</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <label class="settings-preset-visible"><input type="checkbox" data-idx="${idx}" data-key="visible" ${p.visible?'checked':''}> ${t('label_preset_visible')}</label>
        ${idx===0?`<button class="settings-advanced-toggle${advancedMode?' active':''}" id="advanced-toggle">${t('btn_advanced')}</button>`:''}
        ${!p.isDefault?`<button class="settings-preset-delete" data-del="${idx}">${t('btn_preset_delete')}</button>`:''}
      </div>
    </div>
    <div class="settings-grid">
      <div class="settings-field"><label>${t('label_max_time')}</label><input type="number" data-idx="${idx}" data-key="maxDuration" value="${p.maxDuration}" min="1"></div>
      <div class="settings-field"><label>${t('label_max_size_mb')}</label><input type="number" data-idx="${idx}" data-key="maxSizeMB" value="${p.maxSizeMB}" min="1"></div>
      <div class="settings-field"><label>${t('label_total_bitrate')}</label><input type="number" data-idx="${idx}" data-key="totalBitrateMbps" value="${p.totalBitrateMbps||6}" min="1" max="50" step="0.5"></div>
      <div class="settings-field"><label>${t('label_fps')}</label><select data-idx="${idx}" data-key="fps"><option value="30"${p.fps==='30'?' selected':''}>30fps</option><option value="60"${p.fps==='60'?' selected':''}>60fps</option><option value="source"${p.fps==='source'?' selected':''}>${t('label_fps_source')}</option></select></div>
      <div class="settings-field"><label>${t('label_max_width')}</label><input type="number" data-idx="${idx}" data-key="maxWidth" value="${p.maxWidth||1280}" min="240"></div>
      <div class="settings-field"><label>${t('label_max_height')}</label><input type="number" data-idx="${idx}" data-key="maxHeight" value="${p.maxHeight||720}" min="144"></div>
    </div>
    <div class="advanced-fields${advancedMode?' show':''}">
      <div class="settings-divider"></div>
      <div class="settings-grid">
        <div class="settings-field"><label>${t('label_video_codec')}</label><select data-idx="${idx}" data-key="videoCodec"><option value="libx264"${p.videoCodec==='libx264'?' selected':''}>H.264</option></select></div>
        <div class="settings-field"><label>${t('label_audio_bitrate')}</label><select data-idx="${idx}" data-key="audioBitrate"><option value="128k"${p.audioBitrate==='128k'?' selected':''}>128k</option><option value="192k"${p.audioBitrate==='192k'?' selected':''}>192k</option><option value="256k"${p.audioBitrate==='256k'?' selected':''}>256k</option></select></div>
        <div class="settings-field"><label>${t('label_encode_speed')}</label><select data-idx="${idx}" data-key="encPreset"><option value="ultrafast"${p.encPreset==='ultrafast'?' selected':''}>${t('opt_speed_ultrafast')}</option><option value="fast"${p.encPreset==='fast'?' selected':''}>${t('opt_speed_fast')}</option><option value="medium"${p.encPreset==='medium'?' selected':''}>${t('opt_speed_medium')}</option><option value="slow"${p.encPreset==='slow'?' selected':''}>${t('opt_speed_slow')}</option></select></div>
      </div>
    </div>`;
    const delBtn=card.querySelector(`[data-del="${idx}"]`);
    if(delBtn) delBtn.onclick=()=>{settings.presets.splice(idx,1);renderPresetsSettings();};
    container.appendChild(card);
  });
  wireAdvancedToggle();
}

function wireAdvancedToggle(){
  const btn=$('advanced-toggle');
  if(!btn) return;
  btn.onclick=()=>{
    advancedMode=!advancedMode;
    btn.classList.toggle('active',advancedMode);
    document.querySelectorAll('.advanced-fields').forEach(el=>el.classList.toggle('show',advancedMode));
  };
}

async function saveSettings(){
  settings.outputDir=$('setting-output-dir').value;
  settings.tempDir=$('setting-temp-dir').value||'';
  settings.encoder=$('setting-encoder').value;
  settings.defaultPreset=$('setting-default-preset').value;
  settings.previewRes=$('setting-preview-res').value;
  settings.dragLowres=$('setting-drag-lowres').checked;
  // Language
  const langSel=$('setting-language');
  if(langSel&&langSel.value!==settings.language){settings.language=langSel.value;window.i18nSetLang(langSel.value);applyI18n();const tbl=$('titlebar-lang');if(tbl)tbl.value=langSel.value;}
  document.querySelectorAll('#presets-container [data-idx]').forEach(el=>{
    const idx=parseInt(el.dataset.idx), key=el.dataset.key;
    if(el.type==='checkbox') settings.presets[idx][key]=el.checked;
    else if(el.tagName==='SELECT') settings.presets[idx][key]=el.value;
    else if(el.type==='number') settings.presets[idx][key]=parseFloat(el.value);
    else settings.presets[idx][key]=el.value;
  });
  await window.clipx.saveSettings(settings);
  $('settings-modal').classList.remove('show');
  selectedPresetId=settings.defaultPreset||settings.presets.find(p=>p.visible)?.id;
  renderPresets(); updateWarn();
}

// ===== 確認再生 =====
let previewAllIndex=0, previewAllActive=false;

function startPreviewAll(){
  if(!composition.length) return;
  previewAllActive=true;
  previewAllIndex=0;
  const btn=$('btn-preview-all');
  btn.innerHTML=`<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> ${t('btn_preview_stop')}`;
  btn.style.color='var(--accent)';
  btn.style.borderColor='var(--accent)';
  playNextClip();
}

function stopPreviewAll(){
  previewAllActive=false;
  const btn=$('btn-preview-all');
  btn.innerHTML=`<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>${t('btn_preview_all')}`;
  btn.style.color='';
  btn.style.borderColor='';
  $('preview-video').pause();
}

function playNextClip(){
  if(!previewAllActive||previewAllIndex>=composition.length){stopPreviewAll();return;}
  const clip=composition[previewAllIndex];
  const mat=materials.find(m=>m.id===clip.materialId||m.filePath===clip.filePath);
  if(!mat){previewAllIndex++;playNextClip();return;}

  activeCompId=clip.id;
  activeMaterialId=mat.id;
  mat.trimStart=clip.trimStart;
  mat.trimEnd=clip.trimEnd;

  const vid=$('preview-video');
  // 前のクリップのハンドラーを必ずクリア
  vid.ontimeupdate=null;
  vid.onloadedmetadata=null;

  const trans=clip.transition||{id:'dissolve',duration:0.5};
  const hasTrans=previewAllIndex>0&&trans.id!=='cut';
  const transDur=(trans.duration||0.5)*1000;

  const loadAndPlay=()=>{
    vid.src=clip.filePath;
    vid.style.display='block';
    $('preview-placeholder').style.display='none';
    $('time-badge').style.display='';
    if(clip.stretch169){vid.style.width='100%';vid.style.height='100%';vid.style.objectFit='fill';}
    else{vid.style.width='';vid.style.height='';vid.style.objectFit='contain';}

    // onloadedmetadataが発火しない場合のフォールバック
    const metaTimer=setTimeout(()=>{
      vid.onloadedmetadata=null;
      previewAllIndex++;
      setTimeout(playNextClip,50);
    },8000);

    vid.onloadedmetadata=()=>{
      clearTimeout(metaTimer);
      vid.currentTime=clip.trimStart;
      applyAdjustmentsToPreview(clip.adjustments);
      // フェードイン
      if(hasTrans){
        vid.style.opacity='0';
        vid.play();
        const start=performance.now();
        const fadeIn=t=>{
          const p=Math.min(1,(t-start)/transDur);
          vid.style.opacity=p;
          if(p<1) requestAnimationFrame(fadeIn);
          else vid.style.opacity='1';
        };
        requestAnimationFrame(fadeIn);
      } else {
        vid.style.opacity='1';
        vid.play();
      }
    };
    vid.ontimeupdate=()=>{
      const remaining=clip.trimEnd-vid.currentTime;
      $('time-badge').textContent=`${fmt(vid.currentTime)} / ${fmt(clip.trimEnd)} [${previewAllIndex+1}/${composition.length}]`;
      // テロップ表示
      updateTelopOverlay(clip,vid.currentTime);
      // フェードアウト開始
      if(hasTrans&&remaining<=trans.duration&&remaining>=0){
        vid.style.opacity=Math.max(0,remaining/trans.duration);
      }
      if(vid.currentTime>=clip.trimEnd){
        vid.ontimeupdate=null;
        previewAllIndex++;
        setTimeout(playNextClip,50);
      }
    };
  };

  loadAndPlay();
}

init();
</script>
